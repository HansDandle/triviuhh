<style>
/* ===== Triviuhh Dark Theme ===== */
:root {
  --bg:       #0d0d1a;
  --surface:  #16162a;
  --surface2: #1e1e35;
  --border:   #2d2d52;
  --accent:   #8b5cf6;
  --accent2:  #ec4899;
  --text:     #f0f0ff;
  --muted:    #8888aa;
  --success:  #22c55e;
  --radius:   14px;
  --font:     'Nunito', 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  background: var(--bg) !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
  margin: 0 !important; padding: 0 !important;
}

/* ---- jQuery Mobile page ---- */
.ui-page, [data-role="page"] {
  background: var(--bg) !important;
  color: var(--text) !important;
  min-height: 100vh !important;
}

/* ---- Header ---- */
.ui-header, [data-role="header"] {
  background: linear-gradient(135deg, #1a1a35, #12122a) !important;
  border-bottom: 1px solid var(--border) !important;
  box-shadow: 0 2px 16px rgba(0,0,0,0.5) !important;
  text-shadow: none !important;
}
.ui-header h1, .ui-header h4 {
  color: var(--text) !important;
  text-shadow: none !important;
  font-family: var(--font) !important;
}

/* ---- Footer ---- */
.ui-footer, [data-role="footer"] {
  background: linear-gradient(135deg, #1a1a35, #12122a) !important;
  border-top: 1px solid var(--border) !important;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.4) !important;
}
.ui-footer h4 {
  color: var(--text) !important;
  text-shadow: none !important;
  font-family: var(--font) !important;
}

/* ---- Content cards ---- */
#logindiv, #enterliediv, #selectliediv, #viewerdiv, #submitdiv {
  background: var(--surface) !important;
  margin: 14px !important;
  padding: 22px 18px !important;
  border-radius: var(--radius) !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 6px 24px rgba(0,0,0,0.35) !important;
}

h1, h2, h3, h4, h5 {
  color: var(--text) !important;
  text-shadow: none !important;
  font-family: var(--font) !important;
}

/* ---- Buttons ---- */
.ui-btn, [data-role="button"], a[data-role="button"] {
  background: linear-gradient(135deg, var(--accent), var(--accent2)) !important;
  color: #fff !important;
  border: none !important;
  border-radius: 10px !important;
  text-shadow: none !important;
  box-shadow: 0 3px 14px rgba(139,92,246,0.45) !important;
  font-weight: 700 !important;
  font-family: var(--font) !important;
  letter-spacing: 0.4px !important;
  transition: transform 0.1s, opacity 0.1s !important;
}
.ui-btn:hover, a[data-role="button"]:hover {
  opacity: 0.88 !important;
  transform: translateY(-1px) !important;
}
.ui-btn-active { opacity: 0.75 !important; }

/* Host dashboard button gets its own colour */
a[data-role="button"][href="/host.html"] {
  background: linear-gradient(135deg, #1f5fcb, #1a4a9e) !important;
  box-shadow: 0 3px 14px rgba(31,95,203,0.4) !important;
}

/* ---- Text inputs ---- */
.ui-input-text, .ui-input-text.ui-body-inherit {
  background: transparent !important;
  box-shadow: none !important;
  border: none !important;
}
.ui-input-text input, input[type="text"], input[type="password"] {
  background: var(--surface2) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: 10px !important;
  padding: 12px 14px !important;
  box-shadow: none !important;
  font-family: var(--font) !important;
  font-size: 1rem !important;
}
input::placeholder { color: var(--muted) !important; }

/* ---- Labels ---- */
label { color: var(--muted) !important; font-family: var(--font) !important; }
.ui-field-contain { border-bottom: none !important; }

/* ---- Timer ---- */
#timer {
  font-size: 1.25rem !important;
  font-weight: 800 !important;
  color: var(--accent) !important;
  font-family: var(--font) !important;
}

/* Low-time flash */
#timer.urgent { color: var(--accent2) !important; animation: pulse 0.7s infinite alternate; }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

/* ---- Tables ---- */
table { color: var(--text) !important; font-family: var(--font) !important; }
th { color: var(--muted) !important; font-weight: 700 !important; }
.ui-widget-content { background: transparent !important; border: none !important; }
tr:nth-child(even) td { background: rgba(255,255,255,0.04) !important; }

/* ---- Misc jQuery Mobile overrides ---- */
.ui-overlay-a, .ui-page-theme-a { background: var(--bg) !important; }
.ui-body-inherit { background: inherit !important; color: inherit !important; }
.ui-separator { border-color: var(--border) !important; }
.ui-icon-shadow { box-shadow: none !important; }
</style>

//  - Translate the following strings:

var ipValue = "ws://127.0.0.1:8001/";
var gameaddress = "unknown";
var connection;
var received_msg;
var loginname = "";
var jsonobj;
var lies;
var mylie;
var viewer = false;
var reconnectTimer = null;
var reconnectAttempts = 0;
var checkpng = "<img alt=\"OK\" src=\"/src/check.png\">";
var eckspng = "<img alt =\"X\" src=\"/src/ecks.png\">";
var likepng = "<img alt = \"likes\" src=\"/src/like.png\">";
var cuppng = "<img alt = \"pts\" src=\"/src/cup.png\">";
var mylanguage = "EN";

var transjson = `

function randomcase(text){
	var out = text.split('').map((c) => Math.round(Math.random()) ? c.toUpperCase() : c.toLowerCase()).join('');
	return out;
}

function create_table_from_list_of_html_codes(mylist){
	// a general good idea is to make the table even sized.
	// tend towards more rows than columns
	var t = '<table border = "0" width="99%" height = "100%" style="margin: 1px;">';
	var rows = Math.min(Math.ceil(Math.sqrt(mylist.length)*2, mylist.length));
	var cols = Math.ceil(mylist.length/rows);

	for ( var row = 0; row < rows; row ++){
		t = t + '<tr height="20">';
		for (var col = 0; col < cols; col++){
			t = t + '<td align = "center">';
			if (col + cols*row < mylist.length){
				t = t + mylist[col + cols*row];
			}else{
				t = t+ ' ';
			}

			t = t + '</td>';
		}
		t = t + '</tr>\n';
	}
	t = t+ '</table>';
	return t;
}

function init(){
	ipValue = get_websocket_ip();
	gameaddress ="http://"+ ipValue.split("/")[2].split(":")[0] +":8000";
	console.log("Websocket IP:",ipValue);
	showonly('#logindiv');
	document.getElementById('pageheader').firstElementChild.innerHTML= "Triviuhh @ "+gameaddress;

	// Restore name from last session
	var savedName = localStorage.getItem('triviuhh_name');
	if (savedName) {
		$("#loginname").val(savedName);
	}

	connect();

	// Auto-reconnect when phone wakes from sleep
	document.addEventListener('visibilitychange', function() {
		if (!document.hidden) tryReconnect();
	});
	window.addEventListener('online', tryReconnect);
}

function connect() {
	if (connection && (connection.readyState === WebSocket.CONNECTING || connection.readyState === WebSocket.OPEN)) return;
	connection = new WebSocket(ipValue);
	connection.onclose = function(evt) { onClose(evt); };
	connection.onerror = function(evt) { onError(evt); };
	connection.onopen  = function() {
		console.log('WS connected');
		reconnectAttempts = 0;
		clearTimeout(reconnectTimer);
		hideReconnectBanner();
		// Re-authenticate if we had a name
		if (loginname) {
			connection.send('loginname:' + loginname);
			console.log('Re-sent loginname after reconnect:', loginname);
		}
	};
	connection.onmessage = function (evt) {
		received_msg = evt.data;
		console.log('Received WS message:'+received_msg);
		if (received_msg.startsWith("Echo")) return;
		if (received_msg.startsWith("liereject:")) {
			var reason = received_msg.slice(10);
			$("#mylie").val("").attr("placeholder", reason).show();
			$("#liebtn").show();
			document.getElementById("questionh").innerHTML = jsonobj ? jsonobj.question : "Enter your lie!";
			return;
		}
		try{
			jsonobj = JSON.parse(received_msg);
			console.log('JSON object received:'+jsonobj);
		}
		catch(e){
			console.log('Failed to parse json object or other error'+e);
			console.log(received_msg);
			return ;
		}
		var syncedRemaining = Math.max(1, Math.round(jsonobj.phase_duration - (Date.now()/1000 - jsonobj.phase_started)));
		var output = document.getElementById("viewerdivbody");
		output.innerHTML = ''; //clear body
		if (jsonobj.state == 'pregame' && !viewer && loginname) {
			document.getElementById('logindiv').innerHTML =
				'<h1 style="margin:20px 10px">Hi, ' + loginname + '! 👋</h1>' +
				'<p style="font-size:1.2rem;margin:10px;">Waiting for the host to start the game…</p>' +
				'<p style="font-size:1rem;color:#888;margin:10px;">' + jsonobj.players.length + ' player' + (jsonobj.players.length !== 1 ? 's' : '') + ' ready</p>';
		}
		if (jsonobj.state == 'pregame' && viewer){
			document.getElementById("viewerdivhead").innerHTML = '<table width="100%" style="margin: 10px;"> <tr>  <td><img src="qrcode.png" alt = "QR code"> </td> <td> Waiting for players: '+
					gameaddress +'<br/> Players:' + jsonobj.players.length + '</td></tr></table>';
			var pre = document.createElement("b");
			var playerlist = []
			for (var player = 0; player<jsonobj.players.length; player ++){
				playerlist.push(jsonobj.players[player].name);
			}
			pre.innerHTML = create_table_from_list_of_html_codes(playerlist);
			output.appendChild(pre);
			console.log(pre.innerHTML);
		}
		if (jsonobj.state == 'lietome'){
			startTimer(syncedRemaining);
			if (viewer){
				
				document.getElementById("viewerdivhead").innerHTML = jsonobj.question+'<br>Players are submitting their lies…<br>';

				var pre = document.createElement("p");
				var playerlist = [];
				for (var player = 0; player<jsonobj.players.length; player ++){
					var playerHTML =  jsonobj.players[player].name;
					if (jsonobj.players[player].lie != null ) playerHTML = playerHTML + checkpng;
					else playerHTML = playerHTML + eckspng;
					playerlist.push(playerHTML);
				}
				pre.innerHTML = create_table_from_list_of_html_codes(playerlist);
				output.appendChild(pre);
				console.log(pre.innerHTML)
			}else{ // show player lie to me ui
				showquestion(jsonobj.question);
			}
		}
		if (jsonobj.state == 'lieselection' ){
			startTimer(syncedRemaining);
			if (viewer){
				
				document.getElementById("viewerdivhead").innerHTML = jsonobj.question+'<br>Pick the truth:<br>';
				//display all lies

				lies = sortlies();
				for (var l = 0; l<lies.length; l ++){
				    document.getElementById("viewerdivbody").innerHTML = create_table_from_list_of_html_codes(lies);
				}

				var playerswhoselectedlies = 0;
				var playerswholikedlies = 0;

				for (var player = 0; player<jsonobj.players.length; player ++){
				    if (jsonobj.players[player].choice != null) playerswhoselectedlies ++;
				    if (jsonobj.players[player].likes != null) playerswholikedlies ++;
				}
				var pre = document.createElement("p");
				pre.innerHTML = playerswhoselectedlies.toString() + "/" + jsonobj.players.length.toString() + " Selected lies, "+ playerswholikedlies.toString()+"/"+jsonobj.players.length.toString() +" Liked";
				output.appendChild(pre);
				console.log(pre.innerHTML);


			}else{ //show lie selector ui
				showonly("#selectliediv");
				output = document.getElementById("selectliediv") ;
				output.innerHTML = '<h1>'+jsonobj.question+'<br>Pick the real answer</h1>';
				// sort lies in alphabetical order to prevent the truth from floating upper-alpha
				lies = sortlies();
				for (var l = 0; l<lies.length; l ++){
					$("#selectliediv").append('<a data-role="button" id="selectliebtn" onclick=\'selectlie("'+lies[l] +'")\' data-inline="true">'+lies[l]+ '</a><br>\n').trigger('create');
				}
				$("#selectliediv").append('<h1>&nbsp</h1>'); //to make sure last lie isnt hidden
			}
		};
		if (jsonobj.state == 'scoring'){
			startTimer(syncedRemaining);
			showonly("#viewerdiv");
			// Build reveal: truth + all lies with who wrote/fooled
			var revealAnswers = [jsonobj.answer];
			for (var rp = 0; rp < jsonobj.players.length; rp++) {
				if (jsonobj.players[rp].lie && revealAnswers.indexOf(jsonobj.players[rp].lie) < 0)
					revealAnswers.push(jsonobj.players[rp].lie);
			}
			revealAnswers.sort();
			var revealHTML = '<div style="margin-bottom:10px"><b style="font-size:1.2rem">💡 Reveal</b></div>';
			for (var ra = 0; ra < revealAnswers.length; ra++) {
				var ans = revealAnswers[ra];
				var isTruth = ans === jsonobj.answer;
				var lierName = null;
				for (var rq = 0; rq < jsonobj.players.length; rq++) {
					if (jsonobj.players[rq].lie === ans) { lierName = jsonobj.players[rq].name; break; }
				}
				var fooled = [];
				for (var rf = 0; rf < jsonobj.players.length; rf++) {
					if (jsonobj.players[rf].choice === ans) fooled.push(jsonobj.players[rf].name);
				}
				var cardStyle = isTruth
					? 'background:#0f2d18;border:2px solid #3fb950;'
					: 'background:#2a1010;border:2px solid #6e3030;';
				revealHTML += '<div style="' + cardStyle + 'border-radius:10px;padding:12px 14px;margin-bottom:10px">';
				revealHTML += '<div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;font-weight:800;color:' + (isTruth ? '#3fb950' : '#f85149') + '">' + (isTruth ? '✅ The Truth' : '❌ Lie') + '</div>';
				revealHTML += '<div style="font-size:1.1rem;font-weight:800;color:' + (isTruth ? '#3fb950' : '#ff8080') + ';margin:4px 0">' + ans + '</div>';
				if (!isTruth && lierName) {
					revealHTML += '<div style="font-size:0.82rem;color:#f0883e"><span style="color:#8b949e">Written by</span> <b>' + lierName + '</b></div>';
				}
				if (fooled.length) {
					var fooledLabel = isTruth ? 'Guessed correctly' : 'Fooled';
					var fooledColor = isTruth ? '#3fb950' : '#e3b341';
					revealHTML += '<div style="font-size:0.78rem;margin-top:3px"><span style="color:#8b949e;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px">' + fooledLabel + '</span><br><b style="color:' + fooledColor + '">' + fooled.join(', ') + '</b></div>';
				} else {
					revealHTML += '<div style="font-size:0.75rem;color:#8b949e;font-style:italic">' + (isTruth ? '😲 Nobody guessed it!' : 'Nobody was fooled') + '</div>';
				}
				revealHTML += '</div>';
			}
			document.getElementById("viewerdivhead").innerHTML = jsonobj.question;
			document.getElementById("viewerdivbody").innerHTML = revealHTML;
		};
		if (jsonobj.state == "finalscoring") {
			startTimer(syncedRemaining);
			//var pre = document.createElement("h1");
			document.getElementById("viewerdivhead").innerHTML = jsonobj.question + ' (' + jsonobj.answer + ')' + ' <br> Final Scores:';
			//console.log(pre.innerHTML);
			//output.appendChild(pre);

			//sort by scores
			var players_by_score = {};
			for (var player = 0; player < jsonobj.players.length; player++) {
				var p = jsonobj.players[player];
				players_by_score[p.name] = p.score;
			}

			var sorted_players_by_score = Object.keys(players_by_score).map(function (key) {
				return [key, players_by_score[key]];
			});

			sorted_players_by_score.sort(function (first, second) {
				return second[1] - first[1];
			});

			var pre = document.createElement("p");

			var tabletext = '<table width="100%"> <tr>';

			var stepsize = Math.ceil(jsonobj.players.length);
			var numtables = 1;
			if (viewer && jsonobj.players.length >=3 ) {
				numtables = 3;
				stepsize = Math.ceil(jsonobj.players.length/3.0);
			}
			for (var tablecount = 0; tablecount < numtables; tablecount++) {
				tabletext += '<td valign="top">';
				tabletext += "<table border = 0><thead><tr><th>#</th><th>Player</th><th>Their lie</th><th>"+cuppng+"</th><th>"+likepng+"</th></tr></thead><tbody class=\"ui-widget-content\">";

				for (var player = stepsize *tablecount ; player < Math.min(jsonobj.players.length, (stepsize*(tablecount+1))); player++) {
					var p = jsonobj.players[player];
					var l = "";
					if (p.lie != null) l = p.lie;
					tabletext += "<tr><td>" + (player + 1) + "</td><td>" + p.name + "</td><td>" + l + "</td><td>" + p.score  + "</td><td>" + p.likecount  + "</td></tr>\n";
				}
				tabletext += "</tbody></table>";
				tabletext += "</td>";
			}
			tabletext += '</tr></table>';
			pre.innerHTML = tabletext;
			console.log(pre.innerHTML);
			output.appendChild(pre);
		}

	}
}

function onError(evt){
	console.log('WS error: ' + evt);
	// onClose will fire after this
}

function onClose(evt){
	const evtString = `Code: ${evt.code}, Reason: ${evt.reason}`;
	console.log('WS closed: ' + evtString);
	if (loginname) {
		showReconnectBanner();
		scheduleReconnect();
	} else {
		$("#viewerdiv").show();
		document.getElementById("viewerdivhead").innerHTML = 'Disconnected — <a onclick="location.reload()" style="color:#8b5cf6;cursor:pointer">tap to reload</a>';
	}
}

function showReconnectBanner() {
	var b = document.getElementById('reconnect-banner');
	if (!b) {
		b = document.createElement('div');
		b.id = 'reconnect-banner';
		b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1f3a5f;color:#58a6ff;' +
			'text-align:center;padding:12px;font-size:1rem;font-weight:700;z-index:9999;';
		document.body.appendChild(b);
	}
	b.style.display = 'block';
	b.textContent = '\u{1F4F6} Reconnecting…';
}

function hideReconnectBanner() {
	var b = document.getElementById('reconnect-banner');
	if (b) b.style.display = 'none';
}

function scheduleReconnect() {
	clearTimeout(reconnectTimer);
	var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000); // exponential back-off, max 30s
	reconnectAttempts++;
	console.log('Reconnect in ' + delay + 'ms (attempt ' + reconnectAttempts + ')');
	reconnectTimer = setTimeout(function() {
		console.log('Attempting reconnect...');
		connect();
	}, delay);
}

function tryReconnect() {
	if (!connection || connection.readyState === WebSocket.CLOSED || connection.readyState === WebSocket.CLOSING) {
		console.log('Page visible / online — reconnecting');
		reconnectAttempts = 0;
		connect();
	}
}

function login(){
	loginname = $("#loginname").val();
	loginname = loginname.trim();
	localStorage.setItem('triviuhh_name', loginname); // persist for auto-rejoin
	connection.send("loginname:"+loginname);
	console.log("Logged in as:" + loginname);
	document.getElementById('pageheader').firstElementChild.innerHTML= loginname +" @ "+gameaddress;

	document.getElementById("logindiv").innerHTML = loginname + " ready";
	if (viewer) {
		$("#logindiv").append('<br><a data-role="button" id="forcestart" onclick="forcestart()" data-inline="true">Force start game</a><br>\n').trigger('create');
	}
	$("#logindiv").append('<img src="qrcode.png" alt = "QR code"></br>').trigger('create');
	$("#loginbtn").hide();
	$("#loginfieldcontain").hide();
	$("#viewbtn").hide();
	$("#submitdiv").hide();
	$("#advancestatebtn").hide();
}

function scream(){
	$("#logindiv").append("<b>"+randomcase("Scream")+"</b> ").trigger('create');
	connection.send("scream:" + randomcase("scream"));
}

function view(){
	connection.send("view:None");
	console.log("Logged in as:" + loginname);
	$("#logindiv").hide();
	$("#viewerdiv").show();
	$("#submitdiv").hide();
	$("#advancestatebtn").show();
	viewer = true;
}

function forcestart(){
	connection.send("forcestart:"+loginname);
	console.log("Forced start:" + loginname);
}

function isTooClose(lie, answer) {
	if (!lie || !answer) return false;
	// Substring in either direction
	if (answer.indexOf(lie) !== -1 || lie.indexOf(answer) !== -1) return true;
	// Word-set overlap >=80%
	var lieWords = lie.split(/\s+/).filter(Boolean);
	var ansWords = answer.split(/\s+/).filter(Boolean);
	if (lieWords.length && ansWords.length) {
		var overlap = lieWords.filter(function(w){ return ansWords.indexOf(w) !== -1; }).length;
		if (overlap / Math.min(lieWords.length, ansWords.length) >= 0.8) return true;
	}
	return false;
}

function lie(){
	mylie = $("#mylie").val().toUpperCase().trim();
	// convert it to latinize
	mylie = latinize(mylie)
	console.log("latinized?", mylie, jsonobj.answer)
	if (mylie == jsonobj.answer || isTooClose(mylie, jsonobj.answer)){

}

function sortlies(){
	var sortedlies = [jsonobj.answer];
	for (var player = 0; player<jsonobj.players.length; player ++){

	sortedlies.sort();
	return sortedlies;
}

var timerInterval = null;
var timerValue = 60;

function startTimer(seconds) {
    clearInterval(timerInterval);
    timerValue = seconds;
    updateTimerDisplay();
    timerInterval = setInterval(function() {
        timerValue--;
        updateTimerDisplay();
        if (timerValue <= 0) {
            clearInterval(timerInterval);
        }
    }, 1000);
}

function updateTimerDisplay() {
    var timerElem = document.getElementById('timer');
    if (timerElem) {
        timerElem.textContent = timerValue + 's';
        if (timerValue <= 10) timerElem.classList.add('urgent');
        else timerElem.classList.remove('urgent');
    }
}
